name: 爬虫需求猎手

on:
  schedule:
    # 每小时检查一次新issues
    - cron: '0 * * * *'
  workflow_dispatch:  # 手动触发

jobs:
  hunt-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/lead-hunter.yml
            .github/lead-tracker.json
          sparse-checkout-cone-mode: false

      - name: 读取已处理记录
        id: read-tracker
        run: |
          if [ -f ".github/lead-tracker.json" ]; then
            echo "已有追踪记录"
          else
            echo '{"processed": []}' > .github/lead-tracker.json
          fi
          cat .github/lead-tracker.json

      - name: 获取最新Issues并筛选需求
        id: scan-issues
        run: |
          curl -s "https://api.github.com/repos/NanmiCoder/MediaCrawler/issues?state=open&per_page=30&sort=created&direction=desc" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: Mozilla/5.0" > issues.json
          
          cat issues.json | python3 -c "
import json, sys, os

issues = json.load(sys.stdin)
keywords = ['需要', '定制', '外包', '求助', '哪里', '谁能', '收费', '付费', '求', '想要', '开发', '爬取', '可以实现', '帮我', '请问能']

tracker_file = '.github/lead-tracker.json'
tracker = {'processed': []}
if os.path.exists(tracker_file):
    with open(tracker_file) as f:
        tracker = json.load(f)

processed = set(tracker.get('processed', []))

new_leads = []
for i in issues:
    issue_id = str(i['id'])
    title = i.get('title', '')
    body = (i.get('body') or '')[:500]
    user = i.get('user', {}).get('login', '')
    url = i.get('html_url', '')
    created = i.get('created_at', '')[:10]
    labels = [l.get('name', '') for l in i.get('labels', [])]
    
    full_text = (title + body).lower()
    matched = [k for k in keywords if k in full_text]
    
    if issue_id not in processed and matched:
        new_leads.append({
            'id': issue_id,
            'user': user,
            'title': title,
            'url': url,
            'created': created,
            'matched': matched,
            'labels': labels
        })

print(f'NEW_LEADS={len(new_leads)}', flush=True)

for lead in new_leads:
    print(f\"LEAD: @{lead['user']} | {lead['created']} | {lead['title'][:60]}\")
    print(f\"URL: {lead['url']}\")
    print(f\"MATCHED: {lead['matched']}\")
    print('---')

# 保存lead数据供下一步使用
with open('new_leads.json', 'w') as f:
    json.dump(new_leads, f, ensure_ascii=False)
"
          echo "--- 扫描完成 ---"

      - name: 发送邮件通知
        if: env.NEW_LEADS != '0'
        run: |
          python3 << 'PYEOF'
import json, subprocess, os

with open('new_leads.json') as f:
    leads = json.load(f)

if not leads:
    print("没有新需求，退出")
    exit(0)

# 读取tracker
tracker_file = '.github/lead-tracker.json'
tracker = {'processed': []}
if os.path.exists(tracker_file):
    with open(tracker_file) as f:
        tracker = json.load(f)

processed = set(tracker.get('processed', []))

# 构建邮件内容
api_key = os.environ['BREVO_API_KEY']
sender_email = os.environ['BREVO_SENDER_EMAIL']
sender_name = os.environ['BREVO_SENDER_NAME']
notify_email = os.environ['NOTIFY_EMAIL']

# 邮件内容
lines = [
    "🔍 全自动猎客报告",
    "=" * 50,
    f"发现 {len(leads)} 条新需求",
    "",
]
for i, lead in enumerate(leads):
    lines.append(f"{i+1}. @{lead['user']} | {lead['created']}")
    lines.append(f"   标题: {lead['title']}")
    lines.append(f"   链接: {lead['url']}")
    lines.append(f"   匹配: {', '.join(lead['matched'])}")
    lines.append("")

lines.extend([
    "",
    "=" * 50,
    "回复模板（直接复制发给客户）：",
    "",
    "---",
    "你好，看到你的问题。我提供付费技术定制开发服务，",
    "50元起，当天交付。承接各类数据采集、爬虫定制、报错修复。",
    "有需要请回复或加我：",
    "GitHub: https://github.com/liuyuzhe530",
    "---",
    "",
    "系统: GitHub Actions 全自动 | https://github.com/liuyuzhe530/liuyuzhe530",
])

email_body = "\n".join(lines)

# 发送邮件
payload = {
    "sender": {"name": sender_name, "email": sender_email},
    "to": [{"email": notify_email}],
    "subject": f"【需求线索】发现 {len(leads)} 条新需求 | 全自动猎客",
    "textContent": email_body
}

import urllib.request
req = urllib.request.Request(
    'https://api.brevo.com/v3/smtp/email',
    data=json.dumps(payload).encode(),
    headers={
        'api-key': api_key,
        'Content-Type': 'application/json'
    },
    method='POST'
)
try:
    with urllib.request.urlopen(req, timeout=30) as resp:
        result = json.loads(resp.read())
        if result.get('messageId'):
            print(f"✅ 邮件发送成功: {result['messageId']}")
            
            # 更新tracker（记录已处理的issues）
            for lead in leads:
                processed.add(lead['id'])
            tracker['processed'] = list(processed)[-100:]  # 只保留最近100条
            
            with open(tracker_file, 'w') as f:
                json.dump(tracker, f, ensure_ascii=False, indent=2)
            print(f"已更新追踪记录，当前共追踪 {len(processed)} 条issues")
        else:
            print(f"❌ 发送失败: {result}")
except Exception as e:
    print(f"❌ 请求失败: {e}")
PYEOF

        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: 更新追踪记录并提交
        if: env.NEW_LEADS != '0'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/lead-tracker.json
          git diff --cached --quiet || git commit -m "更新需求追踪记录 [ci skip]"
          git push origin main || echo "push失败（可能无变更）"
