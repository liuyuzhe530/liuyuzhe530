name: 爬虫需求猎手

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 初始化追踪文件
        run: |
          mkdir -p .github
          if [ ! -f .github/lead-tracker.json ]; then
            echo '{"processed": []}' > .github/lead-tracker.json
          fi

      - name: 执行猎客脚本
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python3 .github/scripts/hunt.py

      - name: 提交tracker更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/lead-tracker.json
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "更新需求追踪 [ci skip]" && git push origin main
          fi
